{% extends "base.html" %}
{% block content %}
<h1>Favorite movies of {{ username }}</h1>
<ul>
    {% for movie in movies %}
    <li class="movie-list">
        <p class="movie-entry">
            {{ movie.title }} ({{ movie.year }}, directed by: {{ movie.director }})
        </p>
    </li>
    {% endfor %}
</ul>
{% endblock %}
