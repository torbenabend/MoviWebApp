{% extends "base.html" %}
{% block content %}
<h1>Users</h1>
<ul>
    {% for user in users %}
    <li class="user-list">
        <a class="user-entry" href="{{ url_for('list_movies', user_id=user.user_id) }}">{{ user.name }}</a>
    </li>
    {% endfor %}
</ul>
<form action="{{ url_for('create_user') }}" method="post">
    <label for="username">New user name:</label>
    <input type="text" id="username" name="username" required><br><br>
    <input type="submit" value="Create user">
</form>
{% endblock %}
